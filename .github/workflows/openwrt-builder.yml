name: ImmortalWrt Builder

permissions:
  contents: write
  actions: read

on:
  repository_dispatch:
    types: [ "Source Code Update" ]
  workflow_dispatch:
    inputs:
      device:
        description: '编译设备型号'
        required: true
        type: choice
        default: 'all'
        options:
          - '256M'
          - '128M'
          - '512M'
          - 'all'
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/padavanonly/immortalwrt-mt798x-6.6'
      commit:
        description: '指定源码commit进行编译，留空拉取最新源码'
        required: false
        type: string
        default: ''
      ssh:
        description: '是否执行 make menuconfig, 编译设备为 all 时无效'
        required: false
        type: boolean
        default: false
      release:
        description: '是否发布编译产物到 Release'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '是否发布为预发布版本 (Pre-release)'
        required: false
        type: boolean
        default: false

env:
  DEVICE_INPUT: ${{ github.event.inputs.device || github.event.client_payload.device || 'all' }}
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo || 'https://github.com/padavanonly/immortalwrt-mt798x-6.6' }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release || 'true' }}
  PRERELEASE: ${{ github.event.inputs.prerelease || 'false' }}
  TZ: Asia/Shanghai

jobs:
  prepare:
    name: 🧭 Prepare device matrix
    runs-on: ubuntu-22.04
    outputs:
      devices: ${{ steps.set.outputs.devices }}
    steps:
      - id: set
        run: |
          case "${DEVICE_INPUT}" in
            all) echo 'devices=["128M","256M","512M"]' >> "$GITHUB_OUTPUT" ;;
            128M|256M|512M) echo "devices=[\"${DEVICE_INPUT}\"]" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported device: ${DEVICE_INPUT}"; exit 1 ;;
          esac

  menuconfig:
    name: ⚙️ Menuconfig & Push
    if: github.event.inputs.ssh == 'true' && github.event.inputs.device != 'all'
    runs-on: ubuntu-22.04
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4
      - name: 🛠️ Init Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libncurses-dev build-essential git wget python3 bzip2
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
      - name: 🔧 Set device variables
        run: |
          case "$DEVICE_INPUT" in
            "256M") echo "CONFIG_FILE=config/256m.config" >> $GITHUB_ENV ;;
            "128M") echo "CONFIG_FILE=config/128m.config" >> $GITHUB_ENV ;;
            "512M") echo "CONFIG_FILE=config/512m.config" >> $GITHUB_ENV ;;
          esac
      - name: ⚙️ Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH
      - name: 🧬 Update & Install feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a
      - name: 🧩 Load custom configuration
        run: |
          [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          BUILD_DEVICE="$DEVICE_INPUT" $GITHUB_WORKSPACE/$DIY_P2_SH
          make defconfig
      - name: ⌨️ SSH connection to Menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 15
      - name: 📤 Push config to main branch
        run: |
          SRC="/workdir/openwrt/.config"
          DST="$GITHUB_WORKSPACE/${CONFIG_FILE}"
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG_FILE"
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git diff --cached --quiet || (
            git commit -m "Update config: ${CONFIG_FILE}" || true
            git pull --rebase origin $CURRENT_BRANCH
            git push -f origin HEAD:$CURRENT_BRANCH
          )

  build:
    name: 🔨 Build ${{ matrix.device }}
    needs: [prepare, menuconfig]
    if: always() && (needs.menuconfig.result == 'success' || needs.menuconfig.result == 'skipped')
    runs-on: ubuntu-22.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.prepare.outputs.devices) }}
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4
      - name: 🪠 Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: 🛠️ Init Environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
      - name: ⚙️ Setup ccache & DL cache
        uses: actions/cache@v4
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ matrix.device }}-${{ env.REPO_BRANCH }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ matrix.device }}-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-
      - name: 🔧 Configure ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z
      - name: 🧬 Update & Install feeds
        run: |
          cd openwrt
          [ -e $GITHUB_WORKSPACE/$FEEDS_CONF ] && mv $GITHUB_WORKSPACE/$FEEDS_CONF feeds.conf.default
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: 🔨 Build firmware
        id: compile
        run: |
          set -e
          DEV="${{ matrix.device }}"
          case "$DEV" in
            "256M") CONFIG="config/256m.config" ;;
            "128M") CONFIG="config/128m.config" ;;
            "512M") CONFIG="config/512m.config" ;;
          esac
          echo "🚀 Building $DEV"
          echo "Using Config: $CONFIG"
          mkdir -p "$GITHUB_WORKSPACE/firmware_collection"
          cd /workdir/openwrt
          cp -f "$GITHUB_WORKSPACE/$CONFIG" .config
          chmod +x "$GITHUB_WORKSPACE/$DIY_P2_SH"
          BUILD_DEVICE="$DEV" "$GITHUB_WORKSPACE/$DIY_P2_SH"
          make defconfig
          make download -j$(nproc)
          if ! make -j$(nproc) CC="ccache gcc" CXX="ccache g++"; then
            echo "⚠️ Multi-threaded failed, retrying single-threaded..."
            make -j1 V=s
          fi
          echo "📥 Collecting Cudy TR3000 flashable firmware for $DEV"
          find bin/targets -type f | sort
          find bin/targets -type f \( -iname '*cudy*tr3000*sysupgrade*.bin' -o -iname '*cudy*tr3000*factory*.bin' \) \
            -exec cp -v {} "$GITHUB_WORKSPACE/firmware_collection/" \;
          find bin/targets -type f \( -name '*cudy*tr3000*.manifest' -o -name 'sha256sums' \) \
            -exec cp -v {} "$GITHUB_WORKSPACE/firmware_collection/" \; || true
          if ! find "$GITHUB_WORKSPACE/firmware_collection" -type f \( -iname '*sysupgrade*.bin' -o -iname '*factory*.bin' \) | grep -q .; then
            echo "ERROR: No Cudy TR3000 flashable firmware collected for $DEV."
            exit 1
          fi
          echo "status=success" >> "$GITHUB_OUTPUT"
      - name: 🪄 Upload Binaries (Artifacts)
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_${{ matrix.device }}_${{ env.REPO_BRANCH }}
          path: ${{ github.workspace }}/firmware_collection/*
          if-no-files-found: error

  publish:
    name: 📤 Publish Release
    needs: [prepare, build]
    if: always() && env.UPLOAD_RELEASE == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4
      - name: 📥 Download successful artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: release_firmware
          merge-multiple: true
      - name: 📌 Generate Release Tag
        id: tag
        run: |
          mkdir -p release_firmware
          echo "===== release_firmware ====="
          find release_firmware -type f -maxdepth 2 -print | sort || true
          if ! find release_firmware -type f \( -iname '*sysupgrade*.bin' -o -iname '*factory*.bin' \) | grep -q .; then
            echo "No flashable firmware artifacts found; skip release."
            echo "status=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="ImmortalWrt-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          cat > release.txt << EOF
          ## 📦 ImmortalWrt Firmware Release

          **🏷️ Release:** $RELEASE_TAG
          **🌿 Branch:** $REPO_BRANCH
          **📱 Device:** ${DEVICE_INPUT}
          **📅 Build Date:** $(date +"%Y-%m-%d %H:%M:%S")
          **🔨 Compiler:** GCC with ccache

          成功的设备固件已上传到 Assets。失败的设备不会拖死其他成功产物。
          EOF
          echo "status=success" >> "$GITHUB_OUTPUT"
      - name: 📤 Upload to Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: release_firmware/*
