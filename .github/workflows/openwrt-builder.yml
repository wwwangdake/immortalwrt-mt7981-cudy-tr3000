name: ImmortalWrt Builder

permissions:
  contents: write
  actions: read

on:
  repository_dispatch:
    types: ["Source Code Update"]
  workflow_dispatch:
    inputs:
      device:
        description: "编译设备型号"
        required: true
        type: choice
        default: "512M"
        options:
          - "128M"
          - "256M"
          - "512M"
          - "all"
      repo:
        description: "指定源码仓库地址"
        required: true
        type: string
        default: "https://github.com/padavanonly/immortalwrt-mt798x-6.6"
      commit:
        description: "指定源码 commit，留空拉取最新源码"
        required: false
        type: string
        default: ""
      ssh:
        description: "是否执行 make menuconfig，仅单设备有效"
        required: false
        type: boolean
        default: false
      release:
        description: "是否发布编译产物到 Release"
        required: false
        type: boolean
        default: true
      prerelease:
        description: "是否发布为预发布版本"
        required: false
        type: boolean
        default: false

env:
  DEVICE_INPUT: ${{ github.event.inputs.device || github.event.client_payload.device || '512M' }}
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo || 'https://github.com/padavanonly/immortalwrt-mt798x-6.6' }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit || github.event.client_payload.commit || '' }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release || 'true' }}
  PRERELEASE: ${{ github.event.inputs.prerelease || 'false' }}
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  TZ: Asia/Shanghai

jobs:
  prepare:
    name: 🧭 Prepare Device Matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      release_tag: ${{ steps.tag.outputs.release_tag }}
    steps:
      - name: 🧭 Set matrix
        id: set
        run: |
          case "${DEVICE_INPUT}" in
            "all") MATRIX='["128M","256M","512M"]' ;;
            "128M") MATRIX='["128M"]' ;;
            "256M") MATRIX='["256M"]' ;;
            "512M") MATRIX='["512M"]' ;;
            *) echo "ERROR: Unknown device ${DEVICE_INPUT}"; exit 1 ;;
          esac
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          echo "Build matrix: ${MATRIX}"

      - name: 🏷️ Generate release tag
        id: tag
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M%S")
          echo "release_tag=ImmortalWrt-${BUILD_TIME}" >> "$GITHUB_OUTPUT"

  menuconfig:
    name: ⚙️ Menuconfig & Push
    if: github.event.inputs.ssh == 'true' && github.event.inputs.device != 'all'
    runs-on: ubuntu-22.04
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Init Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libncurses-dev build-essential git wget python3 bzip2
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone "$REPO_URL" -b "$REPO_BRANCH" --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

      - name: 🔧 Set device variables
        run: |
          case "$DEVICE_INPUT" in
            "128M") echo "CONFIG_FILE=config/128m.config" >> "$GITHUB_ENV" ;;
            "256M") echo "CONFIG_FILE=config/256m.config" >> "$GITHUB_ENV" ;;
            "512M") echo "CONFIG_FILE=config/512m.config" >> "$GITHUB_ENV" ;;
          esac

      - name: 👩‍💻 Copy previous config if exists
        run: |
          if [ -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" ]; then
            cp -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" /workdir/openwrt/.config
          fi

      - name: ⚙️ Load custom feeds
        run: |
          [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
          chmod +x "$DIY_P1_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P1_SH"

      - name: 🧬 Update & Install feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: 🧩 Load custom configuration
        run: |
          [ -e "$CONFIG_FILE" ] && cp -f "$CONFIG_FILE" openwrt/.config
          chmod +x "$DIY_P2_SH"
          cd openwrt
          CURRENT_DEVICE="$DEVICE_INPUT" DEVICE_INPUT="$DEVICE_INPUT" "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: ⌨️ SSH connection to Menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 15

      - name: 📤 Push config to main branch
        run: |
          SRC="/workdir/openwrt/.config"
          DST="$GITHUB_WORKSPACE/${CONFIG_FILE}"
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG_FILE"
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git diff --cached --quiet || (
            git commit -m "Update config: ${CONFIG_FILE}" || true
            git pull --rebase origin "$CURRENT_BRANCH"
            git push -f origin HEAD:"$CURRENT_BRANCH"
          )

  build:
    name: 🔨 Build ${{ matrix.device }}
    needs: [prepare, menuconfig]
    if: always() && (needs.menuconfig.result == 'success' || needs.menuconfig.result == 'skipped')
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4

      - name: 🪠 Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: 🛠️ Init Environment
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          git clone "$REPO_URL" -b "$REPO_BRANCH" --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout "${REPO_COMMIT}"
          fi
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"

      - name: ⚙️ Setup ccache & DL cache
        uses: actions/cache@v4
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-${{ matrix.device }}-${{ env.REPO_BRANCH }}-${{ hashFiles('config/*.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-${{ matrix.device }}-${{ env.REPO_BRANCH }}-
            ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-

      - name: 🔧 Configure ccache
        run: |
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --set-config=cache_dir="$CCACHE_DIR"
          ccache --set-config=compression=true
          ccache -z

      - name: 🧬 Update & Install feeds
        run: |
          cd openwrt
          [ -e "$GITHUB_WORKSPACE/$FEEDS_CONF" ] && mv "$GITHUB_WORKSPACE/$FEEDS_CONF" feeds.conf.default
          chmod +x "$GITHUB_WORKSPACE/$DIY_P1_SH"
          "$GITHUB_WORKSPACE/$DIY_P1_SH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🔨 Build firmware
        id: compile
        run: |
          DEV="${{ matrix.device }}"
          cd /workdir/openwrt

          case "$DEV" in
            "128M") CONFIG="config/128m.config" ;;
            "256M") CONFIG="config/256m.config" ;;
            "512M") CONFIG="config/512m.config" ;;
            *) echo "ERROR: Unknown device $DEV"; exit 1 ;;
          esac

          echo "🚀 Building $DEV"
          echo "Using Config: $CONFIG"
          test -f "$GITHUB_WORKSPACE/$CONFIG"
          cp -f "$GITHUB_WORKSPACE/$CONFIG" .config

          chmod +x "$GITHUB_WORKSPACE/$DIY_P2_SH"
          CURRENT_DEVICE="$DEV" DEVICE_INPUT="$DEV" "$GITHUB_WORKSPACE/$DIY_P2_SH"

          make defconfig
          make download -j$(nproc)

          if ! make -j$(nproc) CC="ccache gcc" CXX="ccache g++"; then
            echo "⚠️ Multi-threaded failed, retrying single-threaded..."
            make -j1 V=s || exit 1
          fi

          echo "📥 Collecting TR3000 firmware files for $DEV"
          rm -rf "$GITHUB_WORKSPACE/firmware_collection"
          mkdir -p "$GITHUB_WORKSPACE/firmware_collection"

          TARGET_DIR="/workdir/openwrt/bin/targets/mediatek/filogic"
          if [ ! -d "$TARGET_DIR" ]; then
            echo "ERROR: target directory not found: $TARGET_DIR"
            echo "===== bin/targets tree ====="
            find /workdir/openwrt/bin/targets -maxdepth 6 -type f | sort || true
            exit 1
          fi

          echo "===== all target files ====="
          find "$TARGET_DIR" -maxdepth 1 -type f -printf '%f\n' | sort || true

          echo "===== collect only Cudy TR3000 firmware ====="
          case "$DEV" in
            "128M") PATTERN='*cudy*tr3000*128*' ;;
            "256M") PATTERN='*cudy*tr3000*256*' ;;
            "512M") PATTERN='*cudy*tr3000*512*' ;;
            *) echo "ERROR: Unknown device $DEV"; exit 1 ;;
          esac

          shopt -s nullglob
          candidates=(
            "$TARGET_DIR"/$PATTERN*.bin
            "$TARGET_DIR"/$PATTERN*.img
            "$TARGET_DIR"/$PATTERN*.gz
            "$TARGET_DIR"/$PATTERN*.itb
          )

          copied=0
          for file in "${candidates[@]}"; do
            base="$(basename "$file")"
            case "$base" in
              *ram-*|*RAM-*|*initramfs*|*kernel*|*rootfs*)
                echo "Skip non-flash helper image: $base"
                continue
                ;;
            esac
            cp -v "$file" "$GITHUB_WORKSPACE/firmware_collection/${DEV}__${base}"
            copied=$((copied + 1))
          done

          if [ -f "$TARGET_DIR/sha256sums" ]; then
            grep -Ei 'cudy.*tr3000|tr3000.*cudy' "$TARGET_DIR/sha256sums" > "$GITHUB_WORKSPACE/firmware_collection/${DEV}__sha256sums" || true
          fi

          manifest_file="$(find "$TARGET_DIR" -maxdepth 1 -type f -name '*cudy*tr3000*.manifest' | sort | head -n 1 || true)"
          if [ -n "$manifest_file" ]; then
            cp -v "$manifest_file" "$GITHUB_WORKSPACE/firmware_collection/${DEV}__$(basename "$manifest_file")"
          fi

          echo "===== firmware_collection ====="
          find "$GITHUB_WORKSPACE/firmware_collection" -maxdepth 1 -type f -printf '%f %s bytes\n' | sort || true

          if [ "$copied" -eq 0 ]; then
            echo "ERROR: No Cudy TR3000 flashable firmware collected for $DEV."
            echo "Expected pattern: $PATTERN"
            echo "This protects you from uploading mt798x RAM helper images by mistake."
            exit 1
          fi

          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: 🪄 Upload Binaries Artifact
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_${{ matrix.device }}_${{ env.REPO_BRANCH }}
          path: ${{ github.workspace }}/firmware_collection/**
          if-no-files-found: error

  release:
    name: 📦 Publish Release
    needs: [prepare, build]
    if: always() && needs.build.result == 'success' && (github.event.inputs.release == 'true' || github.event.inputs.release == '')
    runs-on: ubuntu-22.04
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: 🧹 Flatten release assets
        run: |
          mkdir -p firmware_collection
          find release_assets -type f -print -exec cp -v {} firmware_collection/ \;
          echo "===== firmware_collection ====="
          find firmware_collection -type f -maxdepth 1 -print | sort
          test -n "$(find firmware_collection -type f -maxdepth 1 -print -quit)"

      - name: 📝 Create release notes
        run: |
          cat > release.txt << EOF
          ## 📦 ImmortalWrt Firmware Release

          **🏷️ Release:** ${{ needs.prepare.outputs.release_tag }}
          **🌿 Branch:** $REPO_BRANCH
          **📱 Device:** ${DEVICE_INPUT}
          **📅 Build Date:** $(date +"%Y-%m-%d %H:%M:%S")
          **🔨 Compiler:** GCC with ccache

          ## 📥 Download

          Download the firmware files from the assets below.

          ---

          Built with ❤️ using GitHub Actions
          EOF

      - name: 📤 Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          files=("$GITHUB_WORKSPACE"/firmware_collection/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: firmware_collection is empty, release upload aborted."
            exit 1
          fi

          args=(release create "${{ needs.prepare.outputs.release_tag }}" --repo "$GITHUB_REPOSITORY" --title "${{ needs.prepare.outputs.release_tag }}" --notes-file release.txt --target "$GITHUB_SHA")
          if [ "${PRERELEASE}" = "true" ]; then
            args+=(--prerelease)
          fi
          args+=("${files[@]}")
          gh "${args[@]}"
